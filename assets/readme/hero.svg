<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="100%" height="100%">
  <defs>
    <!-- Dark Fantasy Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060913" />
      <stop offset="50%" stop-color="#0d1424" />
      <stop offset="100%" stop-color="#05070e" />
    </linearGradient>

    <!-- Radial Glow Effects -->
    <radialGradient id="purpleGlow" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="goldGlow" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="cyanGlow" cx="70%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>

    <!-- Card Glassmorphism Gradients -->
    <linearGradient id="glassCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9" />
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <linearGradient id="purpleText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <linearGradient id="hpBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#f87171" />
    </linearGradient>

    <linearGradient id="manaBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-opacity="0.15" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Base Rectangle -->
  <rect width="1200" height="480" fill="url(#bgGrad)" rx="24" />
  <rect width="1200" height="480" fill="url(#grid)" rx="24" />
  <rect width="1200" height="480" fill="url(#purpleGlow)" rx="24" />
  <rect width="1200" height="480" fill="url(#goldGlow)" rx="24" />
  <rect width="1200" height="480" fill="url(#cyanGlow)" rx="24" />

  <!-- Outer Border Frame -->
  <rect x="2" y="2" width="1196" height="476" fill="none" stroke="#334155" stroke-opacity="0.5" stroke-width="2" rx="23" />
  <rect x="10" y="10" width="1180" height="460" fill="none" stroke="#a855f7" stroke-opacity="0.2" stroke-width="1" rx="18" />

  <!-- LEFT HERO SECTION -->
  <g transform="translate(60, 60)">
    <!-- RPG Badge Tag -->
    <rect x="0" y="0" width="230" height="30" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.4" rx="15" />
    <text x="15" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800" fill="#c084fc" letter-spacing="1.5">
      ⚔️ IDLE-RPG NEXT-GEN
    </text>

    <!-- Main Title -->
    <text x="0" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="1">
      STORM <tspan fill="url(#goldText)">CHRONICLES</tspan>
    </text>

    <!-- Subtitle (Russian) -->
    <text x="0" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#94a3b8" letter-spacing="4">
      ХРОНИКИ БЕЗДНЫ
    </text>

    <!-- Short Description -->
    <text x="0" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#cbd5e1">
      Премиальный браузерный Idle-RPG рогалик новой эпохи.
    </text>
    <text x="0" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#64748b">
      60 FPS Canvas бой · Кукла экипировки · 1M+ лута · 16 Зон
    </text>

    <!-- Feature Badges Grid -->
    <g transform="translate(0, 225)">
      <!-- Badge 1: 60 FPS Combat -->
      <g transform="translate(0, 0)">
        <rect width="250" height="44" fill="#0f172a" fill-opacity="0.8" stroke="#334155" stroke-width="1.5" rx="12" />
        <circle cx="24" cy="22" r="12" fill="#ef4444" fill-opacity="0.2" />
        <text x="20" y="26" font-family="system-ui, sans-serif" font-size="14">⚡</text>
        <text x="46" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#f87171">60 FPS Canvas Combat</text>
        <text x="46" y="34" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Динамический 2D VFX движок</text>
      </g>

      <!-- Badge 2: Paperdoll RPG -->
      <g transform="translate(265, 0)">
        <rect width="250" height="44" fill="#0f172a" fill-opacity="0.8" stroke="#334155" stroke-width="1.5" rx="12" />
        <circle cx="24" cy="22" r="12" fill="#3b82f6" fill-opacity="0.2" />
        <text x="18" y="26" font-family="system-ui, sans-serif" font-size="14">🛡️</text>
        <text x="46" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#60a5fa">15 Слотов Экипировки</text>
        <text x="46" y="34" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Полная анатомическая кукла</text>
      </g>

      <!-- Badge 3: 1M+ Procedural Loot -->
      <g transform="translate(0, 56)">
        <rect width="250" height="44" fill="#0f172a" fill-opacity="0.8" stroke="#334155" stroke-width="1.5" rx="12" />
        <circle cx="24" cy="22" r="12" fill="#f59e0b" fill-opacity="0.2" />
        <text x="18" y="26" font-family="system-ui, sans-serif" font-size="14">💎</text>
        <text x="46" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#fbbf24">1,000,000+ Предметов</text>
        <text x="46" y="34" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">7 Рангов и легенды лута</text>
      </g>

      <!-- Badge 4: Pets & Talents -->
      <g transform="translate(265, 56)">
        <rect width="250" height="44" fill="#0f172a" fill-opacity="0.8" stroke="#334155" stroke-width="1.5" rx="12" />
        <circle cx="24" cy="22" r="12" fill="#a855f7" fill-opacity="0.2" />
        <text x="18" y="26" font-family="system-ui, sans-serif" font-size="14">🐉</text>
        <text x="46" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#c084fc">Спутники &amp; Таланты</text>
        <text x="46" y="34" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">5 Питомцев и 3 ветки древа</text>
      </g>
    </g>
  </g>

  <!-- RIGHT SHOWCASE CARD FRAME (MOCKUP OF GAME INTERFACE) -->
  <g transform="translate(640, 50)">
    <!-- Outer Card Shield -->
    <rect width="500" height="380" fill="url(#glassCard)" stroke="#475569" stroke-width="1.5" rx="20" filter="drop-shadow(0 20px 30px rgba(0,0,0,0.7))" />
    <rect width="500" height="380" fill="none" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1" rx="20" />

    <!-- Card Header -->
    <rect x="0" y="0" width="500" height="48" fill="#090d16" fill-opacity="0.6" rx="20" />
    <path d="M 0 48 L 500 48" stroke="#334155" stroke-width="1" />
    <circle cx="24" cy="24" r="6" fill="#ef4444" />
    <circle cx="42" cy="24" r="6" fill="#f59e0b" />
    <circle cx="60" cy="24" r="6" fill="#10b981" />
    <text x="82" y="28" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#94a3b8">STORM CHRONICLES — Боевой Интерфейс</text>
    <rect x="380" y="14" width="100" height="20" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-opacity="0.4" rx="10" />
    <text x="402" y="28" font-family="system-ui, sans-serif" font-size="10" font-weight="800" fill="#34d399">● В БОЮ</text>

    <!-- Inner Hero vs Monster Arena Simulation -->
    <g transform="translate(20, 65)">
      <!-- Arena Box Background -->
      <rect width="460" height="180" fill="#050811" stroke="#1e293b" stroke-width="1.5" rx="14" />

      <!-- Hero Sprite Box -->
      <g transform="translate(40, 30)">
        <rect width="90" height="90" fill="#1e1b4b" stroke="#6366f1" stroke-width="2" rx="16" />
        <text x="28" y="58" font-family="system-ui, sans-serif" font-size="38">🛡️</text>
        <text x="14" y="112" font-family="system-ui, sans-serif" font-size="12" font-weight="900" fill="#ffffff">ПАЛАДИН</text>
        <text x="25" y="126" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#818cf8">Ур. 100</text>
      </g>

      <!-- VS Badge -->
      <circle cx="230" cy="75" r="22" fill="#0f172a" stroke="#f59e0b" stroke-width="2" />
      <text x="218" y="81" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#fbbf24">VS</text>

      <!-- Monster Sprite Box -->
      <g transform="translate(330, 30)">
        <rect width="90" height="90" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="16" />
        <text x="26" y="58" font-family="system-ui, sans-serif" font-size="38">🐉</text>
        <text x="-5" y="112" font-family="system-ui, sans-serif" font-size="11" font-weight="900" fill="#fca5a5">ДРАКОН БЕЗДНЫ</text>
        <text x="22" y="126" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ef4444">👑 БОСС</text>
      </g>

      <!-- Combat Damage FX Splash -->
      <g transform="translate(260, 35)">
        <rect width="110" height="26" fill="#f59e0b" fill-opacity="0.25" stroke="#fbbf24" rx="8" />
        <text x="10" y="18" font-family="system-ui, sans-serif" font-size="12" font-weight="900" fill="#fef08a">💥 425,800 CRIT</text>
      </g>

      <!-- HP & Mana Bars -->
      <g transform="translate(20, 150)">
        <!-- Player HP Bar -->
        <rect x="0" y="0" width="180" height="12" fill="#1e293b" rx="6" />
        <rect x="0" y="0" width="150" height="12" fill="url(#hpBar)" rx="6" />
        <text x="190" y="10" font-family="system-ui, sans-serif" font-size="10" font-weight="800" fill="#f87171">14,250 / 16,000 HP</text>

        <!-- Player Mana Bar -->
        <!-- Monster HP Bar -->
        <rect x="250" y="0" width="180" height="12" fill="#1e293b" rx="6" />
        <rect x="250" y="0" width="110" height="12" fill="url(#hpBar)" rx="6" />
      </g>
    </g>

    <!-- Bottom Rarity Equipment Slots Showcase -->
    <g transform="translate(20, 260)">
      <text x="0" y="14" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#94a3b8" letter-spacing="1">ЭКИПИРОВАННЫЕ АРТЕФАКТЫ (7 РАНГОВ РЕДКОСТИ)</text>

      <g transform="translate(0, 24)">
        <!-- Divine Slot -->
        <g transform="translate(0, 0)">
          <rect width="82" height="74" fill="#0f172a" stroke="#e0e7ff" stroke-width="1.5" rx="10" />
          <text x="27" y="36" font-family="system-ui, sans-serif" font-size="24">⚔️</text>
          <text x="12" y="60" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#e0e7ff">БОЖЕСТВЕННЫЙ</text>
        </g>
        <!-- Mythic Slot -->
        <g transform="translate(94, 0)">
          <rect width="82" height="74" fill="#0f172a" stroke="#f43f5e" stroke-width="1.5" rx="10" />
          <text x="27" y="36" font-family="system-ui, sans-serif" font-size="24">👑</text>
          <text x="16" y="60" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#fb7185">МИФИЧЕСКИЙ</text>
        </g>
        <!-- Legendary Slot -->
        <g transform="translate(188, 0)">
          <rect width="82" height="74" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" rx="10" />
          <text x="27" y="36" font-family="system-ui, sans-serif" font-size="24">💍</text>
          <text x="10" y="60" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#fbbf24">ЛЕГЕНДАРНЫЙ</text>
        </g>
        <!-- Epic Slot -->
        <g transform="translate(282, 0)">
          <rect width="82" height="74" fill="#0f172a" stroke="#a855f7" stroke-width="1.5" rx="10" />
          <text x="27" y="36" font-family="system-ui, sans-serif" font-size="24">🔮</text>
          <text x="18" y="60" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#c084fc">ЭПИЧЕСКИЙ</text>
        </g>
        <!-- Rare Slot -->
        <g transform="translate(376, 0)">
          <rect width="84" height="74" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" rx="10" />
          <text x="28" y="36" font-family="system-ui, sans-serif" font-size="24">🛡️</text>
          <text x="24" y="60" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#60a5fa">РЕДКИЙ</text>
        </g>
      </g>
    </g>
  </g>
</svg>
